<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Unsent • Send it to the void</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body class="bg-neutral-950 text-white min-h-screen font-sans">

<div class="max-w-[420px] mx-auto min-h-screen bg-neutral-950 flex flex-col shadow-2xl">

  <!-- HEADER -->
  <header class="bg-black px-6 py-8 text-center border-b border-rose-600">
    <h1 class="text-5xl font-bold tracking-tighter" style="font-family: 'Playfair Display', serif;">unsent</h1>
    <p class="text-rose-400 text-xs tracking-[4px]">the texts you never sent</p>
  </header>

  <!-- MAIN -->
  <main class="flex-1 px-5 py-6 overflow-y-auto">

    <!-- COMPOSE -->
    <div id="compose" class="tab-content">
      <select id="recipient" class="w-full bg-neutral-900 border border-neutral-700 rounded-2xl px-5 py-4 text-lg outline-none">
        <option value="">Who is this for?</option>
        <option>Ex</option>
        <option>Crush</option>
        <option>Boss</option>
        <option>Mom</option>
        <option>Future Self</option>
        <option>That One Friend</option>
        <option>Everyone</option>
      </select>

      <textarea id="message" rows="7" class="mt-6 w-full bg-neutral-900 border border-neutral-700 rounded-3xl p-6 text-lg outline-none" placeholder="Type the text you wish you sent..."></textarea>

      <button onclick="sendToVoid()" class="mt-8 w-full py-6 bg-gradient-to-r from-rose-600 to-purple-600 rounded-3xl text-xl font-bold">SEND TO THE VOID</button>
    </div>

    <!-- ARCHIVE -->
    <div id="archive" class="tab-content hidden">
      <div id="archive-list" class="space-y-4"></div>
    </div>

    <!-- RECAP -->
    <div id="recap" class="tab-content hidden">
      <div class="bg-neutral-900 rounded-3xl p-8 text-center">
        <h2 class="text-3xl font-bold mb-8">This Month's Unsent Energy</h2>
        <div id="recap-stats" class="space-y-6"></div>
      </div>
    </div>

  </main>

  <!-- BOTTOM NAV -->
  <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 max-w-[420px] w-full bg-black border-t border-rose-900 py-4 flex justify-around text-xs">
    <div onclick="switchTab(0)" class="nav-item text-rose-400">✍️<br>Write</div>
    <div onclick="switchTab(1)" class="nav-item">📜<br>Archive</div>
    <div onclick="switchTab(2)" class="nav-item">📊<br>Recap</div>
  </nav>

</div>

<script src="app.js"></script>
</body>
</html>
