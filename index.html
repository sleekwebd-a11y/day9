<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ARC • Your Life as a Series</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body class="bg-neutral-950 text-white min-h-screen font-sans">

<div class="max-w-[420px] mx-auto min-h-screen bg-neutral-950 flex flex-col shadow-2xl">

  <!-- NETFLIX-STYLE HEADER -->
  <header class="bg-black px-6 py-6 flex items-center justify-between border-b border-red-600">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-red-600 rounded flex items-center justify-center text-white font-bold text-xl">A</div>
      <h1 class="text-4xl font-bold tracking-tighter" style="font-family: 'Playfair Display', serif;">ARC</h1>
    </div>
    <p class="text-xs text-red-400 tracking-widest">SEASON 2026</p>
  </header>

  <!-- MAIN CONTENT -->
  <main class="flex-1 overflow-y-auto px-5 py-6">

    <!-- TODAY SCENE -->
    <div id="tab-today" class="tab-content">
      <div class="bg-neutral-900 rounded-3xl p-6 mb-8">
        <p class="text-xs text-neutral-400 mb-1">EPISODE <span id="episode-number" class="text-red-400">47</span></p>
        <textarea id="scene-input" rows="4" class="w-full bg-neutral-800 rounded-2xl p-5 text-lg outline-none" placeholder="What happened today... (the scene)"></textarea>
        
        <p class="text-xs text-neutral-400 mt-6 mb-3">CURRENT ARC</p>
        <div id="arc-picker" class="grid grid-cols-3 gap-3"></div>
      </div>

      <button onclick="saveScene()" class="w-full py-6 bg-red-600 hover:bg-red-500 rounded-3xl text-xl font-bold">LOG THIS SCENE</button>
    </div>

    <!-- MY ARCS -->
    <div id="tab-arcs" class="tab-content hidden">
      <h2 class="text-xl font-semibold mb-6">Your Story Arcs</h2>
      <div id="arc-list" class="space-y-4"></div>
    </div>

    <!-- SEASON RECAP -->
    <div id="tab-recap" class="tab-content hidden">
      <div class="bg-neutral-900 rounded-3xl p-8 text-center">
        <p class="text-red-400 text-sm tracking-widest mb-2">PREVIOUSLY ON ARC</p>
        <h3 class="text-3xl font-bold" style="font-family: 'Playfair Display', serif;">Season Recap</h3>
        <div id="recap-content" class="mt-8 space-y-6 text-left"></div>
      </div>
    </div>

  </main>

  <!-- BOTTOM NAV -->
  <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 max-w-[420px] w-full bg-black border-t border-red-900/50 py-4">
    <div class="flex justify-around text-xs">
      <div onclick="switchTab(0)" class="nav-item flex flex-col items-center text-red-400">
        📽️<br><span class="mt-1">TODAY</span>
      </div>
      <div onclick="switchTab(1)" class="nav-item flex flex-col items-center">
        📖<br><span class="mt-1">ARCS</span>
      </div>
      <div onclick="switchTab(2)" class="nav-item flex flex-col items-center">
        🎬<br><span class="mt-1">RECAP</span>
      </div>
    </div>
  </nav>

</div>

<script src="app.js"></script>
</body>
</html>
